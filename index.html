<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>重力畫師 | Gravity Painter</title>
<meta name="theme-color" content="#0a0a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a2e;color:#fff;overflow:hidden;height:100vh;touch-action:none}
canvas{display:block;cursor:crosshair}

/* HUD */
.hud{position:fixed;top:0;left:0;right:0;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(10,10,46,0.95),transparent);z-index:10}
.hud-left{display:flex;align-items:center;gap:12px}
.hud-right{display:flex;align-items:center;gap:8px}
.level-badge{background:linear-gradient(135deg,#4fc3f7,#0288d1);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700}
.wells-count{font-size:13px;color:#8890b5}
.wells-count span{color:#4fc3f7;font-weight:700}

/* TOOLBAR */
.toolbar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;background:rgba(10,10,46,0.9);border:1px solid #2a2a6e;border-radius:16px;padding:10px 16px;z-index:10;backdrop-filter:blur(8px)}
.tool-btn{width:50px;height:50px;border-radius:12px;border:2px solid #2a2a6e;background:rgba(255,255,255,0.05);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all 0.2s;font-size:20px}
.tool-btn span{font-size:9px;color:#8890b5}
.tool-btn.active{border-color:#4fc3f7;background:rgba(79,195,247,0.15);box-shadow:0 0 15px rgba(79,195,247,0.3)}
.tool-btn:hover:not(.active){border-color:#556}

/* ACTION BUTTONS */
.action-bar{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10}
.action-btn{padding:10px 24px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-play{background:linear-gradient(135deg,#4caf50,#2e7d32);color:#fff}
.btn-play:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(76,175,80,0.4)}
.btn-reset{background:rgba(255,255,255,0.1);color:#fff;border:1px solid #556}
.btn-reset:hover{border-color:#4fc3f7}
.btn-clear{background:rgba(244,67,54,0.2);color:#f44336;border:1px solid rgba(244,67,54,0.3)}
.btn-clear:hover{background:rgba(244,67,54,0.3)}
.btn-undo{background:rgba(255,255,255,0.1);color:#fff;border:1px solid #556}

/* MENU */
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(8px)}
.menu-overlay.hide{display:none}
.menu-box{background:linear-gradient(135deg,#0d0d3a,#1a1a5e);border:2px solid #4fc3f7;border-radius:24px;padding:40px;text-align:center;max-width:420px;width:90%;box-shadow:0 0 60px rgba(79,195,247,0.2)}
.menu-box h1{font-size:36px;margin-bottom:4px;background:linear-gradient(135deg,#4fc3f7,#e040fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.menu-box .subtitle{color:#8890b5;font-size:14px;margin-bottom:24px}
.menu-box p{color:#8890b5;font-size:13px;line-height:1.8;margin-bottom:20px}
.menu-btn{padding:14px 40px;background:linear-gradient(135deg,#4fc3f7,#0288d1);border:none;border-radius:12px;font-size:16px;font-weight:700;color:#fff;cursor:pointer;transition:all 0.2s;margin:4px}
.menu-btn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(79,195,247,0.4)}
.menu-btn.secondary{background:rgba(255,255,255,0.1);border:1px solid #556}

/* LEVEL COMPLETE */
.complete-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:100;flex-direction:column}
.complete-overlay.show{display:flex}
.complete-box{text-align:center;padding:40px}
.complete-box h2{font-size:32px;color:#ffd700;margin-bottom:8px}
.complete-box .stars{font-size:48px;margin:16px 0}
.complete-box p{color:#8890b5;margin-bottom:24px}

/* TOOLTIP */
.tooltip{position:fixed;bottom:160px;left:50%;transform:translateX(-50%);background:rgba(79,195,247,0.15);border:1px solid rgba(79,195,247,0.3);padding:8px 16px;border-radius:8px;font-size:13px;color:#4fc3f7;z-index:10;white-space:nowrap;pointer-events:none;transition:opacity 0.3s}

/* STRENGTH SLIDER */
.strength-control{position:fixed;right:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:10}
.strength-label{font-size:11px;color:#8890b5;writing-mode:vertical-lr}
.strength-slider{-webkit-appearance:none;width:6px;height:120px;background:#2a2a6e;border-radius:3px;outline:none;writing-mode:vertical-lr;direction:rtl}
.strength-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:#4fc3f7;border-radius:50%;cursor:pointer}
.strength-val{font-size:12px;color:#4fc3f7;font-weight:700}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div class="hud">
<div class="left">
<div class="level-badge" id="levelBadge">關卡 1</div>
<div class="wells-count">引力場：<span id="wellsUsed">0</span>/<span id="wellsMax">3</span></div>
</div>
<div class="hud-right">
<button style="background:rgba(255,255,255,0.1);border:1px solid #556;color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer" onclick="showMenu()">☰</button>
</div>
</div>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip">點擊畫布放置引力場</div>

<!-- STRENGTH -->
<div class="strength-control" id="strengthCtrl">
<div class="strength-val" id="strengthVal">50</div>
<input type="range" class="strength-slider" id="strengthSlider" min="10" max="100" value="50" oninput="updateStrength()">
<div class="strength-label">引力強度</div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
<button class="tool-btn active" id="toolAttract" onclick="setTool('attract')"><span>引力</span>🌀</button>
<button class="tool-btn" id="toolRepel" onclick="setTool('repel')"><span>斥力</span>💥</button>
<button class="tool-btn" id="toolOrbit" onclick="setTool('orbit')"><span>軌道</span>⭕</button>
<button class="tool-btn" id="toolErase" onclick="setTool('erase')"><span>擦除</span>🗑️</button>
</div>

<!-- ACTIONS -->
<div class="action-bar">
<button class="action-btn btn-undo" onclick="undoField()">↩ 撤銷</button>
<button class="action-btn btn-clear" onclick="clearFields()">✕ 清空</button>
<button class="action-btn btn-reset" onclick="resetParticles()">↺ 重置</button>
<button class="action-btn btn-play" id="playBtn" onclick="toggleSimulation()">▶ 開始</button>
</div>

<!-- MENU -->
<div class="menu-overlay" id="menuOverlay">
<div class="menu-box">
<h1>重力畫師</h1>
<div class="subtitle">GRAVITY PAINTER</div>
<p>🎨 畫引力場引導粒子到目標<br>🌀 引力場吸引粒子 ｜ 💥 斥力場推開粒子<br>⭕ 軌道場讓粒子環繞飛行<br>用最少嘅引力場完成關卡！</p>
<button class="menu-btn" onclick="startGame()">開始遊戲</button>
<button class="menu-btn secondary" onclick="showLevelSelect()">選擇關卡</button>
</div>
</div>

<!-- LEVEL COMPLETE -->
<div class="complete-overlay" id="completeOverlay">
<div class="complete-box">
<h2>✨ 關卡完成！</h2>
<div class="stars" id="starsDisplay">⭐⭐⭐</div>
<p id="completeMsg">用咗 2 個引力場</p>
<button class="menu-btn" onclick="nextLevel()">下一關 →</button>
<button class="menu-btn secondary" onclick="showMenu()">返回選單</button>
</div>
</div>

<script>
// === AUDIO ===
let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}

function sfxPlace(){
const c=getAudio();const o=c.createOscillator();const g=c.createGain();
o.type='sine';o.frequency.setValueAtTime(200,c.currentTime);
o.frequency.exponentialRampToValueAtTime(400,c.currentTime+0.15);
g.gain.setValueAtTime(0.12,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);
o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.2);
}

function sfxRepel(){
const c=getAudio();const o=c.createOscillator();const g=c.createGain();
o.type='sawtooth';o.frequency.setValueAtTime(300,c.currentTime);
o.frequency.exponentialRampToValueAtTime(100,c.currentTime+0.15);
g.gain.setValueAtTime(0.08,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);
o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.2);
}

function sfxOrbit(){
const c=getAudio();
[300,450,600].forEach((f,i)=>{setTimeout(()=>{
const o=c.createOscillator();const g=c.createGain();
o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0.06,c.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.15);
o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.15);
},i*60)});
}

function sfxCollect(){
const c=getAudio();
[523,659,784,1047].forEach((f,i)=>{setTimeout(()=>{
const o=c.createOscillator();const g=c.createGain();
o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.15,c.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);
o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.3);
},i*100)});
}

function sfxWin(){
const c=getAudio();
[523,659,784,1047,784,1047,1319].forEach((f,i)=>{setTimeout(()=>{
const o=c.createOscillator();const g=c.createGain();
o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.12,c.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.4);
o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.4);
},i*150)});
}

function sfxTick(){
const c=getAudio();const o=c.createOscillator();const g=c.createGain();
o.type='sine';o.frequency.value=800;g.gain.setValueAtTime(0.03,c.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.05);
o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.05);
}

// === GAME STATE ===
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
let W,H;
let currentLevel=0;
let tool='attract';
let fields=[];
let particles=[];
let targets=[];
let running=false;
let animId=null;
let simTime=0;
const MAX_SIM_TIME=600; // 10 seconds at 60fps

function resize(){
W=canvas.width=window.innerWidth;
H=canvas.height=window.innerHeight;
}
window.addEventListener('resize',resize);
resize();

// === LEVELS ===
const LEVELS=[
// Level 1: Simple attract
{name:"初識引力",maxFields:3,
particles:[{x:0.2,y:0.5}],
targets:[{x:0.8,y:0.5,r:30}]},
// Level 2: Two particles
{name:"雙子星",maxFields:4,
particles:[{x:0.15,y:0.3},{x:0.15,y:0.7}],
targets:[{x:0.85,y:0.3,r:25},{x:0.85,y:0.7,r:25}]},
// Level 3: Around the corner
{name:"轉角遇見你",maxFields:3,
particles:[{x:0.2,y:0.8}],
targets:[{x:0.8,y:0.2,r:30}]},
// Level 4: Repeller needed
{name:"反彈專家",maxFields:4,
particles:[{x:0.5,y:0.1}],
targets:[{x:0.5,y:0.9,r:30}]},
// Level 5: Orbit challenge
{name:"環繞飛行",maxFields:3,
particles:[{x:0.2,y:0.5}],
targets:[{x:0.8,y:0.5,r:25}]},
// Level 6: Three targets
{name:"三星連珠",maxFields:5,
particles:[{x:0.5,y:0.5}],
targets:[{x:0.2,y:0.2,r:20},{x:0.8,y:0.2,r:20},{x:0.5,y:0.85,r:20}]},
// Level 7: Narrow path
{name:"窄巷穿行",maxFields:4,
particles:[{x:0.1,y:0.5}],
targets:[{x:0.9,y:0.5,r:25}]},
// Level 8: Multi-particle chaos
{name:"群星亂舞",maxFields:6,
particles:[{x:0.1,y:0.2},{x:0.1,y:0.5},{x:0.1,y:0.8}],
targets:[{x:0.9,y:0.2,r:20},{x:0.9,y:0.5,r:20},{x:0.9,y:0.8,r:20}]},
// Level 9: Precision
{name:"精準控制",maxFields:3,
particles:[{x:0.5,y:0.1}],
targets:[{x:0.5,y:0.9,r:20}]},
// Level 10: Grand finale
{name:"重力大師",maxFields:8,
particles:[{x:0.1,y:0.2},{x:0.1,y:0.5},{x:0.1,y:0.8},{x:0.3,y:0.5}],
targets:[{x:0.9,y:0.15,r:18},{x:0.9,y:0.4,r:18},{x:0.9,y:0.65,r:18},{x:0.9,y:0.85,r:18}]}
];

// === TOOLS ===
function setTool(t){
tool=t;
document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
document.getElementById('tool'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
const tips={attract:'點擊放置引力場（吸引粒子）',repel:'點擊放置斥力場（推開粒子）',orbit:'點擊放置軌道場（環繞）',erase:'點擊移除引力場'};
document.getElementById('tooltip').textContent=tips[t];
}

function updateStrength(){
document.getElementById('strengthVal').textContent=document.getElementById('strengthSlider').value;
}

// === CANVAS INPUT ===
let isDragging=false;
canvas.addEventListener('mousedown',e=>{isDragging=true;handleInput(e.clientX,e.clientY)});
canvas.addEventListener('mousemove',e=>{if(isDragging)handleInput(e.clientX,e.clientY)});
canvas.addEventListener('mouseup',()=>isDragging=false);
canvas.addEventListener('touchstart',e=>{e.preventDefault();isDragging=true;handleInput(e.touches[0].clientX,e.touches[0].clientY)});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(isDragging)handleInput(e.touches[0].clientX,e.touches[0].clientY)});
canvas.addEventListener('touchend',()=>isDragging=false);

function handleInput(mx,my){
if(running)return;
if(tool==='erase'){
// Remove nearest field
let minD=40,mini=-1;
fields.forEach((f,i)=>{const d=Math.hypot(f.x-mx,f.y-my);if(d<minD){minD=d;mini=i}});
if(mini>=0){fields.splice(mini,1);sfxRepel()}
}else{
if(fields.length>=LEVELS[currentLevel].maxFields)return;
const str=parseInt(document.getElementById('strengthSlider').value);
fields.push({x:mx,y:my,type:tool,strength:str});
if(tool==='attract')sfxPlace();
else if(tool==='repel')sfxRepel();
else if(tool==='orbit')sfxOrbit();
}
}

// === SIMULATION ===
function toggleSimulation(){
if(running){resetParticles();return}
running=true;simTime=0;
document.getElementById('playBtn').textContent='⏹ 停止';
document.getElementById('tooltip').textContent='模擬中...';
}

function resetParticles(){
running=false;
if(animId)cancelAnimationFrame(animId);
document.getElementById('playBtn').textContent='▶ 開始';
const lvl=LEVELS[currentLevel];
particles=lvl.particles.map(p=>({x:p.x*W,y:p.y*H,vx:0,vy:0,trail:[]}));
document.getElementById('tooltip').textContent='點擊放置引力場';
}

function clearFields(){
if(running)return;
fields=[];
sfxRepel();
}

function undoField(){
if(running)return;
fields.pop();
sfxTick();
}

function loadLevel(idx){
currentLevel=idx;
const lvl=LEVELS[idx];
document.getElementById('levelBadge').textContent='關卡 '+(idx+1);
document.getElementById('wellsMax').textContent=lvl.maxFields;
fields=[];
particles=lvl.particles.map(p=>({x:p.x*W,y:p.y*H,vx:0,vy:0,trail:[]}));
targets=lvl.targets.map(t=>({x:t.x*W,y:t.y*H,r:t.r,collected:false}));
running=false;
document.getElementById('playBtn').textContent='▶ 開始';
document.getElementById('wellsUsed').textContent='0';
document.getElementById('tooltip').textContent='「'+lvl.name+'」— 點擊放置引力場';
}

// === PHYSICS ===
function simulate(){
if(!running)return;
simTime++;
particles.forEach(p=>{
// Apply gravity from fields
fields.forEach(f=>{
const dx=f.x-p.x,dy=f.y-p.y;
const dist=Math.max(Math.hypot(dx,dy),20);
const force=(f.strength*0.5)/(dist*0.01+1);
const angle=Math.atan2(dy,dx);
if(f.type==='attract'){
p.vx+=Math.cos(angle)*force*0.03;
p.vy+=Math.sin(angle)*force*0.03;
}else if(f.type==='repel'){
p.vx-=Math.cos(angle)*force*0.04;
p.vy-=Math.sin(angle)*force*0.04;
}else if(f.type==='orbit'){
// Perpendicular force (creates orbit)
p.vx+=(-Math.sin(angle))*force*0.03;
p.vy+=(Math.cos(angle))*force*0.03;
// Slight attraction
p.vx+=Math.cos(angle)*force*0.01;
p.vy+=Math.sin(angle)*force*0.01;
}
});

// Damping
p.vx*=0.995;p.vy*=0.995;

// Speed limit
const spd=Math.hypot(p.vx,p.vy);
if(spd>8){p.vx=p.vx/spd*8;p.vy=p.vy/spd*8}

// Update position
p.x+=p.vx;p.y+=p.vy;

// Trail
p.trail.push({x:p.x,y:p.y});
if(p.trail.length>60)p.trail.shift();

// Boundary bounce
if(p.x<10){p.x=10;p.vx=Math.abs(p.vx)*0.7}
if(p.x>W-10){p.x=W-10;p.vx=-Math.abs(p.vx)*0.7}
if(p.y<10){p.y=10;p.vy=Math.abs(p.vy)*0.7}
if(p.y>H-10){p.y=H-10;p.vy=-Math.abs(p.vy)*0.7}

// Check target collection
targets.forEach(t=>{
if(!t.collected&&Math.hypot(p.x-t.x,p.y-t.y)<t.r+5){
t.collected=true;
sfxCollect();
}
});
});

// Check win
if(targets.every(t=>t.collected)){
running=false;
sfxWin();
showComplete();
return;
}

// Timeout
if(simTime>MAX_SIM_TIME){
running=false;
document.getElementById('playBtn').textContent='▶ 開始';
document.getElementById('tooltip').textContent='⏰ 時間到！試下調整引力場';
}
}

// === RENDER ===
function render(){
ctx.clearRect(0,0,W,H);

// Background grid
ctx.strokeStyle='rgba(79,195,247,0.05)';
ctx.lineWidth=1;
for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

// Targets
targets.forEach(t=>{
const alpha=t.collected?0.2:0.6+Math.sin(Date.now()*0.003)*0.2;
ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);
ctx.strokeStyle=`rgba(255,215,0,${alpha})`;ctx.lineWidth=2;ctx.stroke();
if(!t.collected){
ctx.beginPath();ctx.arc(t.x,t.y,t.r*0.5,0,Math.PI*2);
ctx.fillStyle='rgba(255,215,0,0.15)';ctx.fill();
// Glow
const grd=ctx.createRadialGradient(t.x,t.y,0,t.x,t.y,t.r*2);
grd.addColorStop(0,'rgba(255,215,0,0.1)');grd.addColorStop(1,'transparent');
ctx.fillStyle=grd;ctx.fillRect(t.x-t.r*2,t.y-t.r*2,t.r*4,t.r*4);
}
});

// Fields
fields.forEach(f=>{
const color=f.type==='attract'?'79,195,247':f.type==='repel'?'244,67,54':'156,39,176';
const r=20+f.strength*0.3;
// Glow
const grd=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,r*2);
grd.addColorStop(0,`rgba(${color},0.2)`);grd.addColorStop(1,'transparent');
ctx.fillStyle=grd;ctx.fillRect(f.x-r*2,f.y-r*2,r*4,r*4);
// Ring
ctx.beginPath();ctx.arc(f.x,f.y,r,0,Math.PI*2);
ctx.strokeStyle=`rgba(${color},0.6)`;ctx.lineWidth=2;ctx.stroke();
// Center
ctx.beginPath();ctx.arc(f.x,f.y,4,0,Math.PI*2);
ctx.fillStyle=`rgba(${color},0.8)`;ctx.fill();
// Pulse animation
const pulse=0.5+Math.sin(Date.now()*0.005)*0.3;
ctx.beginPath();ctx.arc(f.x,f.y,r*(0.8+pulse*0.3),0,Math.PI*2);
ctx.strokeStyle=`rgba(${color},${0.1+pulse*0.15})`;ctx.lineWidth=1;ctx.stroke();
});

// Particles
particles.forEach(p=>{
// Trail
if(p.trail.length>1){
for(let i=1;i<p.trail.length;i++){
const alpha=i/p.trail.length*0.4;
ctx.beginPath();ctx.moveTo(p.trail[i-1].x,p.trail[i-1].y);ctx.lineTo(p.trail[i].x,p.trail[i].y);
ctx.strokeStyle=`rgba(79,195,247,${alpha})`;ctx.lineWidth=2;ctx.stroke();
}
}
// Particle
const grd=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,8);
grd.addColorStop(0,'rgba(255,255,255,0.9)');grd.addColorStop(0.5,'rgba(79,195,247,0.6)');grd.addColorStop(1,'transparent');
ctx.fillStyle=grd;ctx.beginPath();ctx.arc(p.x,p.y,8,0,Math.PI*2);ctx.fill();
});

// Update wells count
document.getElementById('wellsUsed').textContent=fields.length;
}

// === GAME LOOP ===
function gameLoop(){
if(running)simulate();
render();
animId=requestAnimationFrame(gameLoop);
}

// === MENU ===
function showMenu(){
document.getElementById('menuOverlay').classList.remove('hide');
document.getElementById('completeOverlay').classList.remove('show');
}

function startGame(){
document.getElementById('menuOverlay').classList.add('hide');
loadLevel(0);
gameLoop();
}

function showLevelSelect(){
// Simple level select via menu
const box=document.querySelector('.menu-box');
box.innerHTML='<h1>選擇關卡</h1><div class="subtitle">LEVEL SELECT</div>'+
LEVELS.map((l,i)=>`<button class="menu-btn" style="margin:4px;width:80%" onclick="selectLevel(${i})">關卡 ${i+1}：${l.name}</button>`).join('')+
'<br><button class="menu-btn secondary" style="margin-top:12px" onclick="showMenu()">返回</button>';
}

function selectLevel(idx){
document.getElementById('menuOverlay').classList.add('hide');
loadLevel(idx);
if(!animId)gameLoop();
}

function showComplete(){
const lvl=LEVELS[currentLevel];
const used=fields.length;
const max=lvl.maxFields;
let stars='⭐';
if(used<=max*0.5)stars='⭐⭐⭐';
else if(used<=max*0.75)stars='⭐⭐';

document.getElementById('starsDisplay').textContent=stars;
document.getElementById('completeMsg').textContent=`「${lvl.name}」— 用咗 ${used} 個引力場（最多 ${max}）`;
document.getElementById('completeOverlay').classList.add('show');
}

function nextLevel(){
document.getElementById('completeOverlay').classList.remove('show');
if(currentLevel<LEVELS.length-1){
loadLevel(currentLevel+1);
}else{
showMenu();
document.querySelector('.menu-box').innerHTML='<h1>🎉 恭喜！</h1><div class="subtitle">你已經成為重力大師！</div><p>完成咗所有關卡！</p><button class="menu-btn" onclick="location.reload()">再玩一次</button>';
}
}

// Init
loadLevel(0);
</script>
</body>
</html>
